<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Donut Dad</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%; overflow:hidden;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    background:#bde3f2;
  }
  body {
    background:
      radial-gradient(circle at 20% 15%, #fff7 0 60px, transparent 61px),
      radial-gradient(circle at 80% 25%, #fff6 0 45px, transparent 46px),
      radial-gradient(circle at 65% 80%, #fff5 0 70px, transparent 71px),
      linear-gradient(#aee0f5, #cdeefb 60%, #ffe9f3);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  #stage { position:fixed; inset:0; }

  #head {
    position:absolute; left:50%; top:50%;
    width:min(62vw, 46vh); aspect-ratio:1;
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:6px solid #fff;
    box-shadow:0 10px 30px rgba(60,90,130,.25);
    background-size:cover; background-position:center;
    transition:transform .12s ease;
  }
  #head.puff  { animation: wobble 2.4s ease-in-out; }
  #head.spit  { animation: pop .5s ease; }
  @keyframes wobble {
    0%,100% { transform:translate(-50%,-50%) rotate(0deg) scale(1); }
    20% { transform:translate(-50%,-50%) rotate(-2deg) scale(1.04); }
    50% { transform:translate(-50%,-50%) rotate(2deg)  scale(1.06); }
    80% { transform:translate(-50%,-50%) rotate(-1deg) scale(1.05); }
  }
  @keyframes pop {
    0% { transform:translate(-50%,-50%) scale(1.08); }
    40%{ transform:translate(-50%,-50%) scale(.96); }
    100%{ transform:translate(-50%,-50%) scale(1); }
  }

  #donut {
    position:absolute; width:120px; height:120px;
    left:0; top:0;
    will-change:transform;
    filter:drop-shadow(0 6px 8px rgba(60,40,30,.3));
  }
  #donut.held { filter:drop-shadow(0 12px 14px rgba(60,40,30,.4)); }
  #donut.hidden { display:none; }

  #count {
    position:absolute; top:max(12px, env(safe-area-inset-top)); left:50%;
    transform:translateX(-50%);
    font-size:28px; font-weight:800; color:#fff;
    text-shadow:0 2px 6px rgba(80,50,90,.4);
    letter-spacing:.5px;
    pointer-events:none;
  }
  .burst {
    position:absolute; font-size:30px; pointer-events:none;
    animation: fly .9s ease-out forwards;
  }
  @keyframes fly {
    from { opacity:1; transform:translate(0,0) scale(1); }
    to   { opacity:0; transform:var(--fly) scale(1.6); }
  }
  .star {
    position:absolute; pointer-events:none;
    line-height:1; font-weight:900;
    text-shadow:0 0 8px currentColor;
    animation: starfly .75s ease-out forwards;
    will-change:transform, opacity;
  }
  @keyframes starfly {
    from { opacity:1; transform:translate(-50%,-50%) scale(.3) rotate(0deg); }
    60%  { opacity:1; }
    to   { opacity:0; transform:translate(-50%,-50%) var(--fly) scale(1.3) rotate(var(--spin)); }
  }
</style>
</head>

  <svg id="donut" viewBox="0 0 120 120">

const head  = document.getElementById('head');
const donut = document.getElementById('donut');
const spin  = document.getElementById('donutSpin');
const countEl = document.getElementById('count');

const imgs = {};
for (const k in FACES) { imgs[k] = new Image(); imgs[k].src = FACES[k]; }
function setFace(name){ head.style.backgroundImage = `url(${FACES[name]})`; }
setFace('rest');

const DONUT = 120, R = DONUT/2;
let W = innerWidth, H = innerHeight;
addEventListener('resize', () => { W = innerWidth; H = innerHeight; });

/* ---------- audio (synthesized, no files needed) ---------- */
let ac = null;
function audio(){ if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==='suspended') ac.resume(); return ac; }
function noiseBuf(ctx, secs){
  const b = ctx.createBuffer(1, ctx.sampleRate*secs, ctx.sampleRate);
  const d = b.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  return b;
}
function inhaleSound(dur){
  const ctx = audio(), t = ctx.currentTime;
  const src = ctx.createBufferSource(); src.buffer = noiseBuf(ctx, dur);
  const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(400, t);
  bp.frequency.exponentialRampToValueAtTime(1800, t+dur);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.5, t+dur*0.5);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  src.connect(bp).connect(g).connect(ctx.destination);
  src.start(t); src.stop(t+dur);
}
function spitSound(){
  const ctx = audio(), t = ctx.currentTime;
  // raspberry: low buzzy osc with wobble
  const o = ctx.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(60, t+0.35);
  const lfo = ctx.createOscillator(); lfo.frequency.value = 28;
  const lg = ctx.createGain(); lg.gain.value = 40;
  lfo.connect(lg).connect(o.frequency);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0.35, t);
  og.gain.exponentialRampToValueAtTime(0.0001, t+0.4);
  o.connect(og).connect(ctx.destination);
  // burst of air
  const src = ctx.createBufferSource(); src.buffer = noiseBuf(ctx, 0.3);
  const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1200;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.5, t);
  ng.gain.exponentialRampToValueAtTime(0.0001, t+0.3);
  src.connect(hp).connect(ng).connect(ctx.destination);
  o.start(t); o.stop(t+0.45); lfo.start(t); lfo.stop(t+0.45);
  src.start(t); src.stop(t+0.3);
}
function bounceSound(speed){
  const ctx = audio(), t = ctx.currentTime;
  // pinball "boing": pitch scales with impact speed
  const f = 220 + Math.min(speed,1200)/1200*500;
  const o = ctx.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(f, t);
  o.frequency.exponentialRampToValueAtTime(f*1.6, t+0.04);
  o.frequency.exponentialRampToValueAtTime(f*0.8, t+0.12);
  const g = ctx.createGain();
  const v = 0.12 + Math.min(speed,1200)/1200*0.25;
  g.gain.setValueAtTime(v, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.15);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t+0.16);
}
function gulpSound(){
  const ctx = audio(), t = ctx.currentTime;
  const o = ctx.createOscillator(); o.type='sine';
  o.frequency.setValueAtTime(500, t);
  o.frequency.exponentialRampToValueAtTime(160, t+0.18);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+0.2);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t+0.2);
}

/* ---------- geometry ---------- */
function headRect(){ return head.getBoundingClientRect(); }
function mouthPos(){
  const r = headRect();
  // mouth sits a bit below the center of the cropped face
  return { x: r.left + r.width*0.49, y: r.top + r.height*0.70, r: r.width*0.26 };
}
function randomSpot(){
  // anywhere on screen but not on top of the head
  const hr = headRect();
  const hx = hr.left + hr.width/2, hy = hr.top + hr.height/2;
  const minD = hr.width/2 + R + 20;
  for (let i=0;i<40;i++){
    const x = R+10 + Math.random()*(W - DONUT - 20);
    const y = R+60 + Math.random()*(H - DONUT - 80);
    if (Math.hypot(x-hx, y-hy) > minD) return {x,y};
  }
  return {x: R+20, y: H-R-40};
}

/* ---------- donut state ---------- */
let pos = randomSpot();
let target = randomSpot();
let mode = 'float';   // float | held | eaten | pinball
let angle = 0, spinV = 0.15;
let vel = {x:0, y:0}, bounces = 0;
let wallBounces = 0, edgeBounces = 0, lastEdge = 0;
let donuts = 0;

function render(){
  donut.style.transform = `translate(${pos.x-R}px, ${pos.y-R}px)`;
  spin.setAttribute('transform', `rotate(${angle} 60 60)`);
}

let last = performance.now();
function tick(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;

  if (mode === 'float'){
    const dx = target.x-pos.x, dy = target.y-pos.y;
    const d = Math.hypot(dx,dy);
    if (d < 8) target = randomSpot();
    else {
      const sp = 42; // px/s — slow and toddler-catchable
      pos.x += dx/d*sp*dt;
      pos.y += dy/d*sp*dt;
    }
    angle += spinV*60*dt;
    pos.y += Math.sin(now/500)*0.25; // gentle bob
  }
  else if (mode === 'pinball'){
    pos.x += vel.x*dt;
    pos.y += vel.y*dt;

    let hit = 0, edge = 0, bx = pos.x, by = pos.y;
    // walls — note which edge and where it kissed it, for the star burst
    if (pos.x < R)   { pos.x = R;   vel.x =  Math.abs(vel.x); hit = 1; edge = 1; bx = 0; by = pos.y; }
    if (pos.x > W-R) { pos.x = W-R; vel.x = -Math.abs(vel.x); hit = 1; edge = 2; bx = W; by = pos.y; }
    if (pos.y < R)   { pos.y = R;   vel.y =  Math.abs(vel.y); hit = 1; edge = 3; bx = pos.x; by = 0; }
    if (pos.y > H-R) { pos.y = H-R; vel.y = -Math.abs(vel.y); hit = 1; edge = 4; bx = pos.x; by = H; }

    // the head is not an obstacle — the donut flies straight past it

    let sp = Math.hypot(vel.x, vel.y);
    if (hit === 1){
      vel.x *= 0.92; vel.y *= 0.92;       // springy walls — keep the rally alive
      bounceSound(sp);
      starBurst(bx, by);                  // colorful stars burst on each edge hit
      wallBounces++;
      if (edge !== lastEdge){ edgeBounces++; lastEdge = edge; }
      // until it has toured a few different edges, keep enough zip to cross the screen
      if (edgeBounces < 3 && sp < 650){
        const boost = 650 / Math.max(sp, 1);
        vel.x *= boost; vel.y *= boost;
      }
      bounces++;
    }
    vel.x *= Math.pow(0.5, dt/2.6);       // gentler air friction so the bouncing lasts
    vel.y *= Math.pow(0.5, dt/2.6);
    sp = Math.hypot(vel.x, vel.y);
    angle += sp*0.6*dt;                   // spin scales with speed

    // only settle once it has genuinely bounced around 3+ different edges
    if ((sp < 80 && edgeBounces >= 3) || bounces > 45){ mode='float'; target = randomSpot(); }
  }
  render();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ---------- interaction ---------- */
let pid = null;

donut.addEventListener('pointerdown', e => {
  if (mode !== 'float') return;
  audio();
  pid = e.pointerId;
  donut.setPointerCapture(pid);
  mode = 'held';
  donut.classList.add('held');
  setFace('open');
  movePointer(e);
});

donut.addEventListener('pointermove', e => {
  if (mode==='held' && e.pointerId===pid) movePointer(e);
});

function movePointer(e){
  pos.x = e.clientX; pos.y = e.clientY;
  const m = mouthPos();
  if (Math.hypot(pos.x-m.x, pos.y-m.y) < m.r) feed();
}

function release(e){
  if (mode==='held' && e.pointerId===pid){
    mode = 'float';
    donut.classList.remove('held');
    setFace('rest');
    target = randomSpot();
  }
}
donut.addEventListener('pointerup', release);
donut.addEventListener('pointercancel', release);

function feed(){
  mode = 'eaten';
  donut.classList.remove('held');
  donut.classList.add('hidden');
  donuts++;
  countEl.textContent = '🍩 '.repeat(Math.min(donuts,10)).trim() + (donuts>10 ? ' +'+(donuts-10) : '');
  gulpSound();
  setFace('puff');
  head.classList.add('puff');
  const inhaleDur = 2.2;
  setTimeout(()=>inhaleSound(inhaleDur-0.4), 250);

  setTimeout(()=>{
    head.classList.remove('puff');
    head.classList.add('spit');
    setFace('purse');
    spitSound();
    sparkles();
    // donut fires out of the mouth, pinball style
    const m = mouthPos();
    pos.x = m.x; pos.y = m.y + 10;
    donut.classList.remove('hidden');
    // fire diagonally with plenty of sideways travel so it tours every edge
    const dir = Math.random() < 0.5 ? -1 : 1;
    const a = (28 + Math.random()*34) * Math.PI/180;   // 28°–62° below horizontal
    const speed = 1150 + Math.random()*300;
    vel = { x: Math.cos(a)*speed*dir, y: Math.sin(a)*speed };
    bounces = 0; wallBounces = 0; edgeBounces = 0; lastEdge = 0;
    mode = 'pinball';
    setTimeout(()=>{ setFace('rest'); head.classList.remove('spit'); }, 700);
  }, inhaleDur*1000);
}

const STAR_COLORS = ['#ff5d8f','#ffd23f','#5ce0ff','#7dff8a','#a06bff','#ff9f4a','#ff5c5c','#ffffff'];
function starBurst(x, y){
  const stage = document.getElementById('stage');
  const n = 7 + Math.floor(Math.random()*5);
  for (let i=0;i<n;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = '★';
    s.style.left = x+'px'; s.style.top = y+'px';
    s.style.color = STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)];
    s.style.fontSize = (16 + Math.random()*18) + 'px';
    const ang = Math.random()*Math.PI*2;
    const dist = 70 + Math.random()*100;
    s.style.setProperty('--fly', `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`);
    s.style.setProperty('--spin', (Math.random()*540-270)+'deg');
    stage.appendChild(s);
    setTimeout(()=>s.remove(), 800);
  }
}

function sparkles(){
  const m = mouthPos();
  const stuff = ['💦','✨','💨','⭐'];
  for (let i=0;i<6;i++){
    const s = document.createElement('div');
    s.className = 'burst';
    s.textContent = stuff[i%stuff.length];
    s.style.left = m.x+'px'; s.style.top = m.y+'px';
    const a = (Math.random()*1.6-0.8)+Math.PI/2*0; // mostly outward
    const ang = Math.random()*Math.PI*2;
    s.style.setProperty('--fly', `translate(${Math.cos(ang)*120}px, ${Math.sin(ang)*120}px)`);
    document.getElementById('stage').appendChild(s);
    setTimeout(()=>s.remove(), 950);
  }
}

render();
</script>
